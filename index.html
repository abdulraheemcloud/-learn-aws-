<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Junior Cloud Computing Associate | Interactive Learning Platform</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#eef2ff;
  --surface:#fff;
  --card:#fff;
  --border:#c7d2fe;
  --aws:#ff9900;
  --aws2:#e68a00;
  --blue:#2563eb;
  --blue-l:#dbeafe;
  --green:#059669;
  --green-l:#d1fae5;
  --red:#dc2626;
  --red-l:#fee2e2;
  --yellow:#d97706;
  --yellow-l:#fef3c7;
  --purple:#7c3aed;
  --purple-l:#ede9fe;
  --cyan:#0891b2;
  --cyan-l:#cffafe;
  --text:#0f172a;
  --text2:#1e293b;
  --muted:#475569;
  --muted2:#94a3b8;
  --easy:#059669;
  --medium:#d97706;
  --hard:#dc2626;
  --shadow:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(37,99,235,.06);
  --shadow-lg:0 8px 24px rgba(0,0,0,.1),0 32px 64px rgba(37,99,235,.1);
  --r:14px;
  --r-sm:8px;
}

/* Dark Mode Variables */
[data-theme="dark"] {
  --bg:#0f172a;
  --surface:#1e293b;
  --card:#1e293b;
  --border:#334155;
  --text:#f8fafc;
  --text2:#e2e8f0;
  --muted:#94a3b8;
  --muted2:#64748b;
  --blue-l:#1e3a8a;
  --green-l:#064e3b;
  --red-l:#450a0a;
  --yellow-l:#713f12;
  --purple-l:#4c1d95;
  --cyan-l:#164e63;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* HEADER */
.hdr{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:200;padding:0 24px;transition:all 0.3s}
[data-theme="dark"] .hdr{background:rgba(15,23,42,.95)}
.hdr-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:66px;gap:16px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-box{background:var(--aws);color:#000;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;padding:7px 13px;border-radius:var(--r-sm);letter-spacing:.5px;white-space:nowrap}
.logo-text{font-size:15px;font-weight:800;color:var(--text);line-height:1.2}
.logo-sub{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.hdr-right{display:flex;align-items:center;gap:16px}
.progress-wrap{display:flex;align-items:center;gap:10px}
.progress-bar{width:180px;height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--aws),var(--blue));border-radius:99px;width:0%;transition:width .5s}
.prog-label{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--muted);white-space:nowrap}

/* Theme Toggle */
.theme-toggle{width:44px;height:44px;border:2px solid var(--border);border-radius:var(--r-sm);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.2s;color:var(--text)}
.theme-toggle:hover{border-color:var(--blue);transform:scale(1.05)}

/* Search */
.search-btn{width:44px;height:44px;border:2px solid var(--border);border-radius:var(--r-sm);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;color:var(--text);position:relative}
.search-btn:hover{border-color:var(--blue)}
.search-kbd{position:absolute;bottom:-20px;right:0;font-size:10px;background:var(--border);padding:2px 6px;border-radius:4px;font-family:'IBM Plex Mono',monospace;color:var(--muted)}

/* Search Modal */
.search-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.8);z-index:1000;backdrop-filter:blur(8px);padding:80px 20px 20px}
.search-overlay.open{display:block}
.search-container{max-width:700px;margin:0 auto;background:var(--surface);border:2px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-lg)}
.search-input-wrap{padding:20px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:12px}
.search-icon{font-size:20px;color:var(--muted)}
#globalSearch{width:100%;border:none;background:transparent;font-size:18px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);outline:none}
#globalSearch::placeholder{color:var(--muted2)}
.search-close{margin-left:auto;width:32px;height:32px;border:2px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.search-results{max-height:60vh;overflow-y:auto;padding:10px}
.search-result-item{padding:14px 20px;border-radius:var(--r-sm);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px}
.search-result-item:hover{background:var(--blue-l)}
.search-result-type{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;background:var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase}
.search-result-type.module{background:var(--purple-l);color:var(--purple)}
.search-result-type.task{background:var(--green-l);color:var(--green)}
.search-result-type.command{background:var(--cyan-l);color:var(--cyan)}
.search-result-type.flashcard{background:var(--yellow-l);color:var(--yellow)}
.search-result-title{font-size:14px;font-weight:600;color:var(--text)}
.search-result-desc{font-size:12px;color:var(--muted);margin-top:2px}
.no-results{padding:40px;text-align:center;color:var(--muted);font-size:14px}

/* HERO */
.hero{background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 40%,#2563eb 70%,#0891b2 100%);color:#fff;padding:64px 24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(255,153,0,.15) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(255,255,255,.08) 0%,transparent 40%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:60px;background:var(--bg);clip-path:ellipse(55% 100% at 50% 100%)}
.hero-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:48px;align-items:center;position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,153,0,.25);border:1px solid rgba(255,153,0,.5);color:#fbbf24;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:99px;margin-bottom:20px}
.pulse{width:7px;height:7px;background:#fbbf24;border-radius:50%;animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.hero h1{font-size:clamp(28px,4vw,52px);font-weight:800;line-height:1.15;margin-bottom:16px}
.hero h1 em{font-style:normal;color:#fbbf24}
.hero-desc{font-size:16px;opacity:.85;line-height:1.75;margin-bottom:32px;max-width:560px}
.hero-stats{display:flex;gap:32px;flex-wrap:wrap}
.stat{text-align:center}
.stat-n{font-size:30px;font-weight:800;color:#fbbf24;font-family:'IBM Plex Mono',monospace}
.stat-l{font-size:11px;opacity:.75;margin-top:2px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}

/* XP Badge in Hero */
.xp-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:var(--r);padding:16px 24px;text-align:center;backdrop-filter:blur(10px)}
.xp-level{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.8;margin-bottom:4px}
.xp-title{font-size:20px;font-weight:800;margin-bottom:8px}
.xp-bar{height:6px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;margin-bottom:8px}
.xp-fill{height:100%;background:var(--aws);border-radius:99px;width:45%;transition:width 0.5s}
.xp-text{font-size:12px;font-family:'IBM Plex Mono',monospace;opacity:.9}

/* Level Badge */
.level-badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--aws),var(--aws2));color:#000;padding:8px 16px;border-radius:99px;font-size:13px;font-weight:700;margin-top:16px;box-shadow:0 4px 12px rgba(255,153,0,.3)}

/* TABS */
.tabs-wrap{max-width:1400px;margin:40px auto 0;padding:0 24px}
.tab-bar{display:flex;gap:6px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:6px;flex-wrap:wrap;box-shadow:var(--shadow)}
.tab-btn{flex:1;min-width:130px;padding:10px 16px;border:none;border-radius:var(--r-sm);background:transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:6px;position:relative}
.tab-btn.active{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.tab-btn:hover:not(.active){background:var(--blue-l);color:var(--blue)}
.tab-badge{position:absolute;top:-8px;right:-8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface)}

/* CONTENT */
.content{max-width:1400px;margin:0 auto;padding:32px 24px 80px}
.tab-panel{display:none;animation:fadeIn .3s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* SECTION TITLE */
.sec-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:12px}
.sec-sub{font-size:14px;color:var(--muted);margin-bottom:28px}
.divider-line{height:2px;background:linear-gradient(90deg,var(--border),transparent);margin-bottom:28px}

/* Dashboard Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:32px}
.stat-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);transition:all 0.2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;background:var(--blue-l)}
.stat-icon.green{background:var(--green-l)}
.stat-icon.purple{background:var(--purple-l)}
.stat-icon.orange{background:var(--yellow-l)}
.stat-value{font-size:32px;font-weight:800;color:var(--text);font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
.stat-label{font-size:13px;color:var(--muted);font-weight:600}
.stat-change{font-size:12px;color:var(--green);font-weight:700;margin-top:8px;display:flex;align-items:center;gap:4px}

/* Progress Ring */
.progress-ring-wrap{display:flex;align-items:center;gap:24px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:28px;margin-bottom:32px;box-shadow:var(--shadow)}
.progress-ring-svg{width:120px;height:120px;transform:rotate(-90deg)}
.progress-ring-circle{fill:none;stroke:var(--border);stroke-width:8}
.progress-ring-progress{fill:none;stroke:url(#ringGradient);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 0.5s;stroke-dasharray:339.292}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-percent{font-size:28px;font-weight:800;color:var(--text);font-family:'IBM Plex Mono',monospace}
.ring-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.ring-wrap{position:relative;width:120px;height:120px;flex-shrink:0}
.progress-ring-details{flex:1}
.prd-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:12px}
.prd-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.prd-item:last-child{border-bottom:none}
.prd-name{font-size:13px;color:var(--text2);font-weight:600}
.prd-bar{flex:1;height:6px;background:var(--border);border-radius:99px;margin:0 12px;overflow:hidden}
.prd-fill{height:100%;background:var(--blue);border-radius:99px;transition:width 0.5s}
.prd-pct{font-size:12px;font-weight:700;color:var(--muted);font-family:'IBM Plex Mono',monospace;min-width:35px;text-align:right}

/* Streak Calendar */
.streak-section{margin-bottom:32px}
.streak-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.streak-grid{display:flex;gap:4px;flex-wrap:wrap}
.streak-day{width:28px;height:28px;border-radius:6px;background:var(--border);position:relative;transition:all 0.2s}
.streak-day.active{background:var(--green)}
.streak-day.active.high{background:linear-gradient(135deg,var(--green),#10b981)}
.streak-day.today{border:2px solid var(--blue);transform:scale(1.1)}
.streak-fire{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:24px}
.streak-count{font-size:28px;font-weight:800;color:var(--text);font-family:'IBM Plex Mono',monospace}
.streak-label{font-size:13px;color:var(--muted);font-weight:600}

/* MODULE GRID */
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
.mod-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .25s;box-shadow:var(--shadow);position:relative}
.mod-card:hover{border-color:var(--blue);transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.mod-card.locked{opacity:0.6;cursor:not-allowed}
.mod-card.locked::after{content:'🔒';position:absolute;top:16px;right:16px;font-size:20px;opacity:0.5}
.mod-top{padding:20px;display:flex;gap:14px;align-items:flex-start}
.mod-icon{min-width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mod-info h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.3}
.mod-info p{font-size:12px;color:var(--muted);line-height:1.5}
.mod-bottom{border-top:2px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px}
.mod-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;display:flex;align-items:center;gap:5px}
.pill-lab{background:var(--cyan-l);color:var(--cyan)}
.pill-task{background:var(--purple-l);color:var(--purple)}
.pill-quiz{background:var(--green-l);color:var(--green)}
.mod-status{margin-left:auto;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px}
.s-todo{background:#f1f5f9;color:var(--muted)}
[data-theme="dark"] .s-todo{background:#334155;color:var(--muted2)}
.s-active{background:var(--yellow-l);color:var(--yellow);border:1px solid var(--yellow)}
.s-done{background:var(--green-l);color:var(--green);border:1px solid var(--green)}

/* Achievement Badges */
.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-bottom:32px}
.ach-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;transition:all 0.3s;opacity:0.5;filter:grayscale(1)}
.ach-card.unlocked{opacity:1;filter:grayscale(0);border-color:var(--aws);box-shadow:0 4px 12px rgba(255,153,0,.2)}
.ach-icon{font-size:40px;margin-bottom:12px;display:block}
.ach-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.ach-desc{font-size:11px;color:var(--muted);line-height:1.4}

/* Leaderboard */
.leaderboard{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.lb-header{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
.lb-title{font-size:18px;font-weight:800}
.lb-tabs{display:flex;gap:8px}
.lb-tab{padding:6px 14px;border-radius:99px;background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s}
.lb-tab.active{background:#fff;color:var(--blue)}
.lb-list{padding:10px}
.lb-item{display:flex;align-items:center;gap:16px;padding:14px 20px;border-bottom:1px solid var(--border);transition:all 0.2s}
.lb-item:last-child{border-bottom:none}
.lb-item:hover{background:var(--blue-l)}
.lb-rank{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;font-family:'IBM Plex Mono',monospace;background:var(--border);color:var(--muted)}
.lb-rank.gold{background:linear-gradient(135deg,#ffd700,#ffb700);color:#000}
.lb-rank.silver{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#000}
.lb-rank.bronze{background:linear-gradient(135deg,#cd7f32,#b87333);color:#fff}
.lb-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.lb-info{flex:1}
.lb-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.lb-level{font-size:12px;color:var(--muted)}
.lb-xp{font-size:14px;font-weight:800;color:var(--aws);font-family:'IBM Plex Mono',monospace}
.lb-you{background:var(--blue-l);border-left:4px solid var(--blue)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:500;overflow-y:auto;padding:32px 20px;backdrop-filter:blur(4px)}
.overlay.open{display:flex;justify-content:center;align-items:flex-start}
.modal{background:var(--surface);border:2px solid var(--border);border-radius:20px;width:100%;max-width:900px;animation:slideUp .3s ease;margin:auto;position:relative}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.modal-hdr{padding:24px 28px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:16px;justify-content:space-between}
.modal-title-wrap{display:flex;align-items:center;gap:14px}
.modal-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.modal-title{font-size:18px;font-weight:800;color:var(--text)}
.modal-sub{font-size:12px;color:var(--muted)}
.close-btn{width:38px;height:38px;background:var(--bg);border:2px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--muted)}
.close-btn:hover{background:var(--red-l);border-color:var(--red);color:var(--red)}
.modal-body{padding:28px;max-height:75vh;overflow-y:auto}

/* Bookmark Button */
.bookmark-btn{position:absolute;top:20px;right:20px;width:36px;height:36px;border:2px solid var(--border);border-radius:50%;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;color:var(--muted)}
.bookmark-btn:hover{border-color:var(--yellow);color:var(--yellow)}
.bookmark-btn.active{background:var(--yellow);border-color:var(--yellow);color:#fff}

/* LESSON SWITCHER */
.lesson-nav{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.lnav-btn{padding:9px 18px;border:2px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.lnav-btn.active{border-color:var(--blue);background:var(--blue);color:#fff}
.lnav-btn.completed{border-color:var(--green);color:var(--green)}
.lnav-btn.completed::before{content:'✓ ';font-weight:800}
.lpane{display:none}
.lpane.active{display:block}

/* OVERVIEW BOX */
.overview-box{background:linear-gradient(135deg,var(--blue-l),#f0f9ff);border:2px solid #bfdbfe;border-radius:var(--r);padding:20px 24px;margin-bottom:24px}
[data-theme=
